$mod = SUPER

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0

cursor {
    no_hardware_cursors = true
}

env = GTK_THEME,catppuccin-mocha-standard-blue-dark


# Monitor (auto-detect)
monitor = DP-3, 5120x1440@240, 0x0, 1.0, bitdepth, 10

# Terminal
$term = wezterm


# Window focus (Super+hjkl)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Handy speech-to-text
windowrule {
    name = handy-workspace
    match:class = handy
    workspace = special:handy
}
exec-once = waybar
exec-once = handy
exec-once = hyprpaper
exec-once = hypridle
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = systemctl --user start hyprpolkitagent
bind = , F9, exec, pkill -USR2 -x handy
bindr = , F9, exec, pkill -USR2 -x handy

# App shortcuts
bind = ALT, 1, exec, ~/.local/scripts/focus-or-open.sh org.wezfurlong.wezterm $term
bind = ALT, 2, exec, ~/.local/scripts/focus-or-open.sh google-chrome google-chrome-stable
bind = ALT, 3, exec, ~/.local/scripts/focus-or-open.sh zed zeditor

# Basics
bind = $mod, Return, exec, $term
bind = $mod, q, killactive
bind = $mod, d, exec, wofi --show drun
bind = $mod, m, exec, loginctl lock-session
bind = $mod SHIFT, m, exit
bind = $mod, f, fullscreen, 0
bind = $mod, space, togglefloating

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Input
input {
    kb_options = caps:escape
}

# Tiling layout
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(89b4faff)
    col.inactive_border = rgba(313244ff)
}

decoration {
    rounding = 4
}

animations {
    enabled = false
}

misc {
    vfr = false
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
