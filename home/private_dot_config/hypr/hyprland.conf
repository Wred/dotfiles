$mod = SUPER

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

cursor {
    no_hardware_cursors = true
}

# Monitor (auto-detect)
monitor = , preferred, auto, 1

# Terminal
$term = wezterm

# Unified navigation (Super+hjkl) — delegates to nav-pane.sh
# In terminals: sends Alt+hjkl so tmux handles vim→tmux→hyprland chain
# In other apps: direct hyprland movefocus
bind = $mod, h, exec, ~/.local/scripts/nav-pane.sh left
bind = $mod, j, exec, ~/.local/scripts/nav-pane.sh down
bind = $mod, k, exec, ~/.local/scripts/nav-pane.sh up
bind = $mod, l, exec, ~/.local/scripts/nav-pane.sh right

# Move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# Basics
bind = $mod, Return, exec, $term
bind = $mod SHIFT, q, killactive
bind = $mod, d, exec, wofi --show drun
bind = $mod SHIFT, e, exit
bind = $mod, f, fullscreen, 0
bind = $mod, space, togglefloating
bind = $mod, b, layoutmsg, preselect h
bind = $mod, v, layoutmsg, preselect v

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Input
input {
    kb_options = caps:escape
}

# Tiling layout
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(89b4faff)
    col.inactive_border = rgba(313244ff)
}

decoration {
    rounding = 4
}

animations {
    enabled = false
}
