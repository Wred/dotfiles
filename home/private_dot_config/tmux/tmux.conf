set -sa terminal-overrides ",xterm*:Tc:Ms=\\E]52;%p1%s;%p2%s\\7"
set -sa terminal-overrides ",wezterm*:Tc:Ms=\\E]52;%p1%s;%p2%s\\7"

set -g default-terminal "tmux-256color"
set -g mouse on
set -g base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 100           # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g extended-keys on          # enable extended key support (Ctrl+Enter, etc.)
set -g extended-keys-format csi-u
set -g mode-keys vi
set -g status-position top
set -g status-style bg=default

set -g window-active-style 'bg=#090909'
set -g window-style 'bg=black'
set -g pane-active-border-style ''
set -g pane-border-lines heavy
set -g pane-border-indicators colour

set -g @catppuccin_flavor 'mocha'

# Window styling — v2 built-in "rounded" style draws proper pills against the bar bg
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g window-status-separator " "

# Status line styling
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_right_separator " "

# Kube module colors
set -g @catppuccin_kube_context_color "#{@thm_red}"
set -g @catppuccin_kube_namespace_color "#{@thm_sky}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-open'
# resurrect and continuum need to be at the end to work
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @yank_selection_mouse 'clipboard'

bind r source ~/.config/tmux/tmux.conf \; display "reloaded config"

# Use page up to get into copy mode when not in vim
# Credit: https://superuser.com/questions/702189/tmux-scroll-up-down-with-shift-page-up-down-into-a-pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
is_ssh="ps -o comm= -t '#{pane_tty}' | grep -iqE '^ssh$'"

bind -n Pageup if-shell "$is_vim" "send-keys Pageup" "copy-mode -u"

# Pane navigation (Alt+hjkl)
bind -n M-h     select-pane -L
bind -n M-j     select-pane -D
bind -n M-k     select-pane -U
bind -n M-l     select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Pane swapping (Alt+Shift+hjkl)
bind -n M-H     swap-pane -s '{left-of}'
bind -n M-J     swap-pane -s '{down-of}'
bind -n M-K     swap-pane -s '{up-of}'
bind -n M-L     swap-pane -s '{right-of}'

# Pane rotate/flip (Alt+Ctrl+hjkl) — move neighbor and flip split axis
bind -n M-C-h   move-pane -v -s '{left-of}'
bind -n M-C-j   move-pane -h -s '{down-of}'
bind -n M-C-k   move-pane -h -s '{up-of}'
bind -n M-C-l   move-pane -v -s '{right-of}'

# Splitting — forward to remote tmux when in SSH
bind -n C-j if-shell "$is_ssh" "send-keys C-j" "split-window -v -c '#{pane_current_path}'"
bind -n C-k if-shell "$is_ssh" "send-keys C-k" "split-window -v -b -c '#{pane_current_path}'"
bind -n C-l if-shell "$is_ssh" "send-keys C-l" "split-window -h -c '#{pane_current_path}'"
bind -n C-h if-shell "$is_ssh" "send-keys C-h" "split-window -h -b -c '#{pane_current_path}'"

# Session/window management — forward to remote tmux when in SSH
bind -n C-g   if-shell "$is_ssh" "send-keys C-g"   "display-popup -EE -d '#{pane_current_path}' 'tmux-picker.sh'"
bind -n C-y   if-shell "$is_ssh" "send-keys C-y"   "new-window"
bind -n M-u   if-shell "$is_ssh" "send-keys M-y"   "previous-window"
bind -n M-i   if-shell "$is_ssh" "send-keys M-o"   "next-window"
bind -n M-y   if-shell "$is_ssh" "send-keys M-i"   "switch-client -p"
bind -n M-o   if-shell "$is_ssh" "send-keys M-u"   "switch-client -n"
bind -n M-g   if-shell "$is_ssh" "send-keys M-g"   "new-session -A -c '~' -s home"
bind -n M-d   if-shell "$is_ssh" "send-keys M-d"   "kill-session"

set -g @continuum-restore 'on'
set -g @continuum-save-interval 1
set -g @resurrect-strategy-nvim 'session'

# set -g @sessionx-bind '-n C-o'
set -g @sessionx-x-path '~/work/devsnc ~/work/gitlab ~/work/github ~/work/local'
set -g @sessionx-custom-paths ''
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '70%'
set -g @sessionx-filter-current 'false'

# Load catppuccin before setting status-left/right so module variables are defined
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Override catppuccin's kube module to read our own cache (populated by
# ~/.local/scripts/tmux-kube-status-refresh.sh) instead of tmux-kubectx's #{kubectx_*}
# tokens — this is what makes per-directory direnv KUBECONFIG work.
set -gF @catppuccin_kube_text " #{l:#[fg=#{@catppuccin_kube_context_color}]#{@kube_context_cache}#[fg=default]:#[fg=#{@catppuccin_kube_namespace_color}]#{@kube_namespace_cache}}"

# Refresh both caches when the focused pane/window/session changes.
# The hook runs the scripts in the background so they never block input.
set-hook -g after-select-pane      'run-shell -b "~/.local/scripts/tmux-kube-status-refresh.sh"; run-shell -b "~/.local/scripts/tmux-git-status-refresh.sh"'
set-hook -g after-select-window    'run-shell -b "~/.local/scripts/tmux-kube-status-refresh.sh"; run-shell -b "~/.local/scripts/tmux-git-status-refresh.sh"'
set-hook -g client-session-changed 'run-shell -b "~/.local/scripts/tmux-kube-status-refresh.sh"; run-shell -b "~/.local/scripts/tmux-git-status-refresh.sh"'

# Status line modules (must come after catppuccin is loaded)
set -g status-left-length 100
set -g status-right-length 100
# The leading #() is a hidden status-interval fallback: tmux re-runs it on
# every status-interval tick, which exercises the refresh scripts as a polling
# safety net for the case where context/branch changes while staying in the
# same pane (e.g. `kubectl config use-context ...` or `git switch ...`).
set -g status-right "#(~/.local/scripts/tmux-kube-status-refresh.sh >/dev/null 2>&1; ~/.local/scripts/tmux-git-status-refresh.sh >/dev/null 2>&1; echo)#{E:@catppuccin_status_date_time}#{E:@catppuccin_status_host}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override catppuccin's pane border color (must come after TPM)
set -g pane-active-border-style 'fg=#{@thm_pink}'

# Git branch module — must come after TPM so all catppuccin theme vars are finalized.
# Icon (#{@git_icon_cache}) is set dynamically by tmux-git-status-refresh.sh based
# on the remote origin hostname; enterprise GitHub hosts come from $GIT_ENTERPRISE_GITHUB_HOSTS.
# Built manually so both icon and branch resolve at display time (no source needed).
set -gF @catppuccin_status_git "#[fg=#{@thm_green}]#[bg=default]#{@catppuccin_status_left_separator}#[fg=#{@thm_crust},bg=#{@thm_green}]"
set -ag @catppuccin_status_git "#{@git_icon_cache} "
set -agF @catppuccin_status_git "#[fg=#{@thm_fg},bg=#{@thm_surface_0}] "
set -ag @catppuccin_status_git "#{@git_branch_cache}"
set -agF @catppuccin_status_git "#[fg=#{@thm_surface_0}]#[bg=default]#{@catppuccin_status_right_separator}"

# Sessions bar — must come after TPM so catppuccin (loaded by TPM) doesn't overwrite status-format[0]
# Top bar: sessions on left, right-side modules on right
# Bottom bar: window list only
set -g status 2
set -g status-format[0] '#{S/n:#[fg=#{@thm_fg} bg=#{@thm_surface_0}]#[fg=#{@_ctp_status_bg} reverse]#[none]#[fg=#{@thm_fg} bg=#{@thm_surface_0}] #{session_name}#{?#{@claude_working}, #[fg=#{@thm_peach}]󰚩#[fg=#{@thm_fg}],} #[fg=#{@_ctp_status_bg} reverse]#[none]#[fg=default bg=default] ,#[fg=#{@thm_crust} bg=#{@thm_mauve}]#[fg=#{@_ctp_status_bg} reverse]#[none]#[fg=#{@thm_crust} bg=#{@thm_mauve}] #{session_name}#{?#{@claude_working}, #[fg=#{@thm_peach}]󰚩#[fg=#{@thm_crust}],} #[fg=#{@_ctp_status_bg} reverse]#[none]#[fg=default bg=default] }#[align=right]#{E:status-right}'
set -g status-format[1] '#{W:#[range=window|#{window_index}]#{E:window-status-format}#[norange default] ,#[range=window|#{window_index}]#{E:window-status-current-format}#[norange default] }#[align=right]#{?#{!=:#{@kube_context_cache},},#{E:@catppuccin_status_kube},}#{?#{!=:#{@git_branch_cache},},#{E:@catppuccin_status_git},}'
